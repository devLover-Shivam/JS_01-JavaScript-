<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
           margin: 0;
           padding: 0;
           box-sizing: border-box; 
        }
        html,body{
            width: 100%;
            height: 100%;
        }
        #main {
            font-family: Arial, Helvetica, sans-serif;
            width: 100%;
            height: 100%;
            background-color:#e3e3e3 ;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        input{
            display: none;
        }

        #btn{
            padding: 12px 22px;
            background-color: rgb(41,    143, 114);
            color: white;
            font-weight: 500;
            border-radius: 5px;
        }
        #btn:hover{
            background-color: rgb(11, 126, 88);

        }
       
    </style>
</head>
<body>
    <div id="main">
        <input id="fileinp" type="file">
        <div id="btn">
            Upload File
        </div>
    </div>
    <script src="event2.js"></script>
