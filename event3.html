<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
           margin: 0;
           padding: 0;
           box-sizing: border-box; 
        }
        html,body{
            width: 100%;
            height: 100%;
        }
        input{
            display: block;
        }
        #main {
            
            padding: 30px;;
            font-family:Arial, Helvetica, sans-serif;
            width: 100%;
            height: 100%;
            background-color:#e3e3e3 ;            
        }
        
        .card{
            max-width: 200px;
            color: white;
            margin-top: 40px;
            background-color: #555;
            padding: 20px;
            border: 1px solid #555;
            border-radius: 10px;
        }
        .profile{
            width: 50px;
            height: 50px;
            background-color: red;
            border-radius: 50%;
            margin-bottom: 10px;
            overflow: hidden;
        }
        .profile img{
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card h5{
            margin-top: 5px;
        }
        .card p {
            font-size: 12px;
            margin-top: 10px;
        }

    </style>
</head>
<body>
    <div id="main">
        <form action="">
            <input type="text" placeholder="profile pic-link">
            <input type="text" placeholder="name">
            <input type="text" placeholder="designation">
            <input type="text" placeholder="info">
            
            <input type="submit">
        </form>

        
    </div>
    <script src="event3.js"></script>
</body>
</html>
